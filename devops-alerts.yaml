apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: devops-app-alerts
  labels:
    release: monitoring
spec:
  groups:
  - name: devops-app.rules
    rules:

    - alert: DevOpsAppDown
      expr: up{job="devops-service"} == 0
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: DevOps App is DOWN
        description: DevOps application pod is not responding

    - alert: HighRequestRate
      expr: rate(http_requests_total[1m]) > 5
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: High request rate detected
        description: DevOps app receiving more than 5 requests/sec
